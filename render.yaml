services:
  - type: web
    name: telegram-ai-assistant
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        fromSecret: telegramBotToken
      - key: GOOGLE_API_KEY
        fromSecret: googleApiKey
      - key: FIRESTORE_PROJECT_ID
        fromSecret: firestoreProjectId
      - key: FIREBASE_CREDENTIALS
        fromSecret: firebaseCredentials
      - key: GROQ_API_KEY
        fromSecret: groqApiKey
      - key: OPENAI_API_KEY
        fromSecret: openaiApiKey